<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 Canada Day Beerolympics</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  :root { --red:#CC0000; --white:#FFFFFF; --dark:#111; --bl:#e87070; --bd:#c04040; }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;height:100%;overflow:hidden;background:#000}
  body{font-family:'Press Start 2P',monospace}

  .stage{position:absolute;width:1920px;height:1080px;transform-origin:top left;overflow:hidden;background:var(--white);transition:background .6s}
  .stage.red-wins{background:var(--red)}

  .border-outer{position:absolute;inset:0;border:28px solid var(--red);pointer-events:none;z-index:50;transition:border-color .6s}
  .stage.red-wins .border-outer{border-color:var(--dark)}
  .border-inner{position:absolute;inset:28px;border:8px solid var(--dark);pointer-events:none;z-index:50}

  .ground-wrap{position:absolute;bottom:0;left:0;width:100%;height:90px;display:grid;grid-template-columns:1fr 36px 1fr 36px 1fr;z-index:20}
  .brick-strip{background:repeating-linear-gradient(90deg,var(--bl) 0,var(--bl) 48px,var(--bd) 48px,var(--bd) 50px);position:relative;overflow:hidden}
  .brick-strip::before{content:'';position:absolute;top:0;left:0;width:100%;height:50%;background:repeating-linear-gradient(90deg,rgba(255,255,255,.12) 0,rgba(255,255,255,.12) 48px,transparent 48px,transparent 50px)}
  .brick-strip::after{content:'';position:absolute;top:50%;left:24px;width:calc(100% - 24px);height:50%;background:repeating-linear-gradient(90deg,rgba(255,255,255,.08) 0,rgba(255,255,255,.08) 48px,transparent 48px,transparent 50px)}
  .gap-col{background:transparent}

  .canoe-runner{position:absolute;bottom:82px;left:-500px;z-index:30;animation:run 16s linear infinite;}
  .canoe-runner img{height:165px;width:auto;display:block;image-rendering:pixelated;mix-blend-mode:multiply;}
  @keyframes run{from{left:-500px}to{left:110%}}

  .layout{position:absolute;top:36px;left:36px;right:36px;bottom:90px;display:grid;grid-template-columns:1fr 36px 1fr 36px 1fr;grid-template-rows:auto 1fr;z-index:10;padding:30px 20px 10px}

  .title-row{grid-column:1/6;text-align:center;margin-bottom:28px}
  .title-row h1{font-size:52px;color:var(--red);text-shadow:3px 3px 0 var(--dark);letter-spacing:2px;line-height:1.2;transition:color .6s}
  .stage.red-wins .title-row h1{color:var(--white)}

  .col-left{grid-column:1;grid-row:2}
  .col-centre{grid-column:3;grid-row:2;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}
  .col-right{grid-column:5;grid-row:2}

  .winner-label{font-size:36px;color:var(--red);text-align:center;margin-bottom:18px;transition:color .6s}
  .stage.red-wins .winner-label{color:var(--white)}

  .winner-pill{background:var(--red);border:6px solid var(--dark);border-radius:24px;padding:18px 40px;text-align:center;margin-bottom:22px;min-width:380px;box-shadow:4px 4px 0 rgba(0,0,0,.35);transition:background .6s,border-color .6s}
  .stage.red-wins .winner-pill{background:var(--dark);border-color:var(--white)}
  .winner-pill .pill-team{font-size:34px;color:var(--white);line-height:1.4}
  .winner-pill .pill-pts{font-size:46px;color:var(--white);line-height:1.1}

  .loser-line{font-size:26px;color:var(--red);text-align:center;margin-bottom:6px;transition:color .6s}
  .loser-pts{font-size:32px;color:var(--dark);text-align:center;transition:color .6s}
  .stage.red-wins .loser-line,.stage.red-wins .loser-pts{color:var(--white)}

  .maple-block{width:80px;height:80px;background:var(--red);border:6px solid var(--dark);display:flex;align-items:center;justify-content:center;font-size:48px;margin-top:24px;transition:background .6s}
  .stage.red-wins .maple-block{background:var(--white)}

  .status-bar{margin-top:14px;font-size:11px;letter-spacing:1px;color:rgba(0,0,0,.35);text-align:center;transition:color .6s}
  .stage.red-wins .status-bar{color:rgba(255,255,255,.45)}
  .dot{display:inline-block;width:10px;height:10px;border-radius:50%;background:#44cc44;margin-right:6px;vertical-align:middle;animation:pulse 2s infinite}
  .dot.fetching{background:#ffaa00;animation:none}
  .dot.error{background:#ff4444;animation:none}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  .team-label{font-size:22px;letter-spacing:2px;margin-bottom:6px;color:var(--red);transition:color .6s}
  .stage.red-wins .team-label{color:var(--white)}

  .mvp-label{font-size:16px;letter-spacing:2px;margin-bottom:14px;color:var(--red);opacity:.7;transition:color .6s}
  .stage.red-wins .mvp-label{color:var(--white)}

  .mvp-pill{background:var(--red);border:6px solid var(--dark);border-radius:20px;padding:18px 28px;margin-bottom:28px;display:inline-block;min-width:280px;box-shadow:4px 4px 0 rgba(0,0,0,.3);transition:background .6s,border-color .6s}
  .stage.red-wins .mvp-pill{background:var(--dark);border-color:var(--white)}
  .mvp-pill .mvp-name{font-size:30px;color:var(--white);line-height:1.4}
  .mvp-pill .mvp-pts{font-size:26px;color:var(--white)}

  .player-row{display:flex;align-items:baseline;margin-bottom:10px;gap:14px}
  .p-rank{font-size:18px;color:var(--red);min-width:36px;transition:color .6s}
  .p-name{font-size:18px;color:var(--red);flex:1;transition:color .6s}
  .p-pts{font-size:18px;color:var(--dark);min-width:50px;text-align:right;transition:color .6s}
  .stage.red-wins .p-rank,.stage.red-wins .p-name{color:var(--white)}
  .stage.red-wins .p-pts{color:var(--white)}
</style>
</head>
<body>
<div class="stage" id="stage">
  <div class="border-outer"></div>
  <div class="border-inner"></div>
  <div class="ground-wrap">
    <div class="brick-strip"></div><div class="gap-col"></div>
    <div class="brick-strip"></div><div class="gap-col"></div>
    <div class="brick-strip"></div>
  </div>
  <div class="canoe-runner"><img src="Canoe.png" alt="canoe"></div>

  <div class="layout">
    <div class="title-row"><h1>2026 CANADA DAY BEEROLYMPICS SCORECARD</h1></div>

    <!-- LEFT: RED TEAM -->
    <div class="col-left">
      <div class="team-label">RED TEAM</div>
      <div class="mvp-label">MVP</div>
      <div class="mvp-pill">
        <div class="mvp-name" id="redMvpName">—</div>
        <div class="mvp-pts"  id="redMvpPts">—</div>
      </div>
      <div id="redPlayerList"></div>
    </div>

    <!-- CENTRE -->
    <div class="col-centre">
      <div class="winner-label">CURRENT WINNER</div>
      <div class="winner-pill">
        <div class="pill-team" id="winnerTeam">—</div>
        <div class="pill-pts"  id="winnerPts">—</div>
      </div>
      <div class="loser-line" id="loserTeam">—</div>
      <div class="loser-pts"  id="loserPts">—</div>
      <div class="maple-block">🍁</div>
      <div class="status-bar">
        <span class="dot" id="statusDot"></span>
        <span id="statusText">Loading...</span>
      </div>
    </div>

    <!-- RIGHT: WHITE TEAM -->
    <div class="col-right">
      <div class="team-label">WHITE TEAM</div>
      <div class="mvp-label">MVP</div>
      <div class="mvp-pill">
        <div class="mvp-name" id="whiteMvpName">—</div>
        <div class="mvp-pts"  id="whiteMvpPts">—</div>
      </div>
      <div id="whitePlayerList"></div>
    </div>
  </div>
</div>

<script>
// ── SCALE ──
function scaleStage() {
  const s=document.getElementById('stage');
  const W=1920,H=1080,sc=Math.min(window.innerWidth/W,window.innerHeight/H);
  s.style.width=W+'px'; s.style.height=H+'px';
  s.style.transform=`scale(${sc})`;
  s.style.left=((window.innerWidth -W*sc)/2)+'px';
  s.style.top =((window.innerHeight-H*sc)/2)+'px';
}
scaleStage();
window.addEventListener('resize',scaleStage);

const API_URL  = 'https://script.google.com/macros/s/AKfycbzprLfwc4BJmYeu5U0vWdyu4xKVOTztibpGEqD9wShmVA1SthYsLCJC2kQOh1MyZ1B0/exec';
const REFRESH_MS = 30000;

const BONUS_CSV_URL = 'https://docs.google.com/spreadsheets/d/10ggx9WjHPnFeTcFncbyJL3tdeMH61cz6vq_4Yea--sA/gviz/tq?tqx=out:csv&headers=0&gid=0';

function setStatus(state,text) {
  document.getElementById('statusDot').className='dot'+(state!=='ok'?' '+state:'');
  document.getElementById('statusText').textContent=text;
}

// ── RENDER ──
// Data shape from Apps Script:
// {
//   winnerName: "WHITE Bitches",   winnerPts: "53 pts",
//   loserName:  "RED Bitches",     loserPts:  "29",
//   redMvp:   { name: "Maddie", pts: "12 pts" },
//   whiteMvp: { name: "Brian",  pts: "26 pts" },
//   redPlayers:   [ { name, pts }, ... ],   // 9 players, sorted by sheet
//   whitePlayers: [ { name, pts }, ... ]    // 9 players, sorted by sheet
// }
function render(d) {
  const stage = document.getElementById('stage');

  // Work out who's winning from winnerName to set background
  const redWins = d.winnerName.toLowerCase().includes('red');
  redWins ? stage.classList.add('red-wins') : stage.classList.remove('red-wins');

  // Centre pill — use exactly what the sheet says
  document.getElementById('winnerTeam').textContent = d.winnerName.toUpperCase().replace('BITCHES','B*TCHES');
  document.getElementById('winnerPts').textContent  = String(d.winnerPts).toUpperCase();
  document.getElementById('loserTeam').textContent  = d.loserName.toUpperCase().replace('BITCHES','B*TCHES');
  document.getElementById('loserPts').textContent   = String(d.loserPts).toUpperCase();

  // MVPs
  document.getElementById('redMvpName').textContent   = d.redMvp.name.toUpperCase();
  document.getElementById('redMvpPts').textContent    = String(d.redMvp.pts).toUpperCase();
  document.getElementById('whiteMvpName').textContent = d.whiteMvp.name.toUpperCase();
  document.getElementById('whiteMvpPts').textContent  = String(d.whiteMvp.pts).toUpperCase();

  // Player lists — sheet already sorts them, skip index 0 (MVP shown above)
  buildList('redPlayerList',   d.redPlayers);
  buildList('whitePlayerList', d.whitePlayers);
}

function buildList(id, players) {
  const c = document.getElementById(id);
  c.innerHTML = '';
  // Skip first player (MVP already shown), show all remaining 8
  players.slice(1).forEach((p, i) => {
    const row = document.createElement('div');
    row.className = 'player-row';
    row.innerHTML = `
      <span class="p-rank">${i+1}.</span>
      <span class="p-name">${p.name.toUpperCase()}</span>
      <span class="p-pts">${p.pts}</span>`;
    c.appendChild(row);
  });
}

function normName(n) {
  return String(n == null ? '' : n).trim().replace(/\s+/g, ' ').toUpperCase();
}

function parseCsvLine(line) {
  const out = []; let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (inQ) {
      if (ch === '"') { if (line[i+1] === '"') { cur += '"'; i++; } else inQ = false; }
      else cur += ch;
    } else if (ch === '"') inQ = true;
    else if (ch === ',') { out.push(cur); cur = ''; }
    else cur += ch;
  }
  out.push(cur);
  return out;
}

function parseBonusCsv(text) {
  const map = {};
  String(text).split(/\r?\n/).forEach(line => {
    if (!line.trim()) return;
    const cols = parseCsvLine(line);
    const name = normName(cols[0]);
    const num  = parseFloat(String(cols[1]).replace(/[^0-9.\-]/g, ''));
    if (!name || !isFinite(num)) return;
    map[name] = (map[name] || 0) + num;
  });
  return map;
}

function addBonus(ptsValue, bonus) {
  const str = String(ptsValue == null ? '' : ptsValue);
  const m = str.match(/-?\d+(\.\d+)?/);
  if (!m) return str;
  const sum = parseFloat(m[0]) + bonus;
  return str.replace(m[0], String(sum));
}

let bonusMap = {};

async function loadBonus() {
  if (!BONUS_CSV_URL) { bonusMap = {}; return; }
  try {
    const res = await fetch(BONUS_CSV_URL, { redirect: 'follow' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    bonusMap = parseBonusCsv(await res.text());
  } catch (e) {
    console.warn('Bonus sheet unavailable — showing main scores only:', e);
    bonusMap = {};
  }
}

function applyBonuses(d, map) {
  if (!map || !Object.keys(map).length) return;
  const bump = (entry) => {
    if (!entry || entry.name == null) return;
    const add = map[normName(entry.name)];
    if (isFinite(add)) entry.pts = addBonus(entry.pts, add);
  };
  bump(d.redMvp);
  bump(d.whiteMvp);
  (d.redPlayers   || []).forEach(bump);
  (d.whitePlayers || []).forEach(bump);
}

// ── FETCH ──
async function refresh() {
  setStatus('fetching','Refreshing...');
  try {
    // Apps Script requires no-cors workaround when opened as a local file
    const res  = await fetch(API_URL, { redirect: 'follow' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();

    // Validate we got the fields we expect
    if (!data.winnerName || !data.redMvp || !data.whiteMvp)
      throw new Error('Missing fields — redeploy the Apps Script');

    try { await loadBonus(); applyBonuses(data, bonusMap); }
    catch (e) { console.warn('Bonus overlay skipped:', e); }

    render(data);
    const t = new Date().toLocaleTimeString('en-CA',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    setStatus('ok','Live · Updated ' + t);
  } catch(err) {
    console.error(err);
    setStatus('error', err.message.substring(0,70));
  }
}

refresh();
setInterval(refresh, REFRESH_MS);
</script>
</body>
</html>
